<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Intelligence - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: rgba(22, 27, 34, 0.8);
            --accent: #fbbf24;
            --neon-red: #ef4444;
            --neon-green: #2ecc71;
            --neon-blue: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1f29 0%, #0b0e14 100%);
            color: var(--text-main);
            display: flex; min-height: 100vh;
        }

        .icon-sidebar {
            width: 70px; height: 100vh; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 0; border-right: 1px solid #30363d;
            position: fixed; left: 0; top: 0; z-index: 100;
        }
        .icon-sidebar a {
            color: var(--text-dim); font-size: 22px;
            margin-bottom: 35px; cursor: pointer; transition: 0.3s; text-decoration: none;
        }
        .icon-sidebar a.active,
        .icon-sidebar a:hover { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .icon-sidebar a.logout { margin-top: auto; margin-bottom: 20px; color: var(--neon-red) !important; }

        .main-content { margin-left: 70px; padding: 40px; width: calc(100% - 70px); }

        .page-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 30px;
        }
        .page-header h2 { font-size: 1.6rem; font-weight: 300; letter-spacing: 1px; }
        .page-header h2 span { color: var(--accent); font-weight: 800; }

        .user-badge {
            background: var(--card-bg); border: 1px solid #30363d;
            border-radius: 20px; padding: 8px 16px;
            font-size: 12px; color: var(--text-dim);
        }
        .user-badge span { color: var(--accent); }

        /* Stats */
        .stats-row {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; margin-bottom: 30px;
        }
        .stat-box {
            background: var(--card-bg); padding: 20px;
            border-radius: 15px; border: 1px solid #30363d;
            border-left: 4px solid var(--accent);
            transition: transform 0.2s;
        }
        .stat-box:hover { transform: translateY(-3px); }
        .stat-box h3 { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-box p { font-size: 28px; font-weight: bold; margin-top: 8px; }

        /* Glass Card */
        .glass-card {
            background: var(--card-bg); border-radius: 15px;
            border: 1px solid #30363d; padding: 25px;
            margin-bottom: 30px;
        }
        .glass-card h4 {
            font-size: 12px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 20px;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex; gap: 15px; align-items: flex-end;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .f-group { display: flex; flex-direction: column; gap: 5px; }
        .f-group label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: bold; }
        select, input {
            background: #0d1117; border: 1px solid #30363d;
            color: #fff; padding: 10px 12px; border-radius: 8px;
            font-size: 12px; outline: none;
        }
        select:focus, input:focus { border-color: var(--accent); }

        .btn-primary {
            background: var(--accent); color: #000; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 12px; transition: 0.2s;
        }
        .btn-primary:hover { filter: brightness(1.1); }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 12px 15px;
            color: var(--accent); font-size: 11px;
            border-bottom: 2px solid #30363d; text-transform: uppercase;
        }
        td {
            padding: 12px 15px; font-size: 13px;
            border-bottom: 1px solid #21262d; color: var(--text-dim);
        }
        tr:hover td { background: rgba(255,255,255,0.02); }

        /* Badges */
        .badge {
            padding: 3px 10px; border-radius: 20px;
            font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
        .badge-admin { background: rgba(251,191,36,0.15); color: var(--accent); }
        .badge-analyst { background: rgba(59,130,246,0.15); color: var(--neon-blue); }
        .badge-officer { background: rgba(46,204,113,0.15); color: var(--neon-green); }
        .badge-active { background: rgba(46,204,113,0.15); color: var(--neon-green); }
        .badge-inactive { background: rgba(239,68,68,0.15); color: var(--neon-red); }

        /* Action Buttons */
        .btn-action {
            background: transparent; border: 1px solid #30363d;
            color: var(--text-dim); padding: 5px 10px;
            border-radius: 6px; cursor: pointer; font-size: 11px;
            transition: 0.2s; margin-right: 5px;
        }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); }
        .btn-delete { border-color: #30363d; }
        .btn-delete:hover { border-color: var(--neon-red) !important; color: var(--neon-red) !important; }

        /* Pagination */
        .table-footer {
            display: flex; justify-content: space-between;
            align-items: center; margin-top: 15px;
        }
        .page-btns { display: flex; gap: 8px; }
        .btn-nav {
            background: #1a1f29; border: 1px solid #30363d; color: #fff;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 999;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 16px; padding: 30px; width: 420px;
        }
        .modal h3 { font-size: 16px; margin-bottom: 20px; color: var(--accent); }
        .modal-field { margin-bottom: 15px; }
        .modal-field label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
        .modal-field input,
        .modal-field select { width: 100%; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        .btn-cancel {
            background: transparent; border: 1px solid #30363d;
            color: var(--text-dim); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-size: 13px;
        }

        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-dim);
        }
        .empty-state i { font-size: 40px; margin-bottom: 15px; opacity: 0.3; display: block; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="icon-sidebar">
        <a href="dashboard.html"><i class="fas fa-th-large"></i></a>
        <a href="reports.html"><i class="fas fa-chart-line"></i></a>
        <a href="logs.html"><i class="fas fa-shield-alt"></i></a>
        <a href="admin.html" class="active"><i class="fas fa-users-cog"></i></a>
        <a href="upload.html"><i class="fas fa-upload"></i></a>
        <a class="logout" onclick="handleLogout()"><i class="fas fa-power-off"></i></a>
    </div>

    <!-- Main -->
    <div class="main-content">

        <div class="page-header">
            <h2>ADMIN <span>PANEL</span></h2>
            <div class="user-badge">
                👤 <span id="user-name">--</span> &nbsp;|&nbsp; 🔑 <span id="user-role">--</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-box">
                <h3>Total Users</h3><p id="stat-total">0</p>
            </div>
            <div class="stat-box" style="border-left-color:var(--accent);">
                <h3>Admins</h3><p id="stat-admins">0</p>
            </div>
            <div class="stat-box" style="border-left-color:var(--neon-blue);">
                <h3>Analysts</h3><p id="stat-analysts">0</p>
            </div>
            <div class="stat-box" style="border-left-color:var(--neon-green);">
                <h3>Officers</h3><p id="stat-officers">0</p>
            </div>
        </div>

        <!-- Users Table -->
        <div class="glass-card">
            <h4>👥 User Management</h4>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="f-group">
                    <label>Role</label>
                    <select id="filter-role" onchange="renderUsers()">
                        <option value="all">All Roles</option>
                        <option value="Admin">Admin</option>
                        <option value="Analyst">Analyst</option>
                        <option value="Officer">Officer</option>
                    </select>
                </div>
                <div class="f-group">
                    <label>Search</label>
                    <input type="text" id="filter-search" placeholder="Name or email..." oninput="renderUsers()">
                </div>
                <div class="f-group" style="justify-content:flex-end;">
                    <label>&nbsp;</label>
                    <button class="btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus"></i> Add User
                    </button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-body">
                    <tr><td colspan="6"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i>Loading...</div></td></tr>
                </tbody>
            </table>

            <div class="table-footer">
                <span id="users-page-info" style="font-size:11px; color:var(--text-dim);">Showing 0 of 0</span>
                <div class="page-btns">
                    <button class="btn-nav" id="users-prev" onclick="changePage(-1)" disabled><i class="fas fa-chevron-left"></i></button>
                    <button class="btn-nav" id="users-next" onclick="changePage(1)" disabled><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal">
            <h3 id="modal-title">Add New User</h3>
            <input type="hidden" id="edit-user-id">

            <div class="modal-field">
                <label>Full Name</label>
                <input type="text" id="modal-name" placeholder="Ex: Officer John">
            </div>
            <div class="modal-field">
                <label>Email</label>
                <input type="email" id="modal-email" placeholder="name@police.gov">
            </div>
            <div class="modal-field">
                <label>Role</label>
                <select id="modal-role">
                    <option value="Officer">Police Officer</option>
                    <option value="Analyst">Data Analyst</option>
                    <option value="Admin">Administrator</option>
                </select>
            </div>
            <div class="modal-field" id="password-field">
                <label>Password</label>
                <input type="password" id="modal-password" placeholder="Min. 8 characters">
            </div>

            <p id="modal-msg" style="font-size:12px; min-height:18px; margin-top:10px;"></p>

            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="saveUser()">Save User</button>
            </div>
        </div>
    </div>

    <script>
        // ====== Auth Check ======
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        const userName = localStorage.getItem('name');

        if (!token) window.location.href = 'index.html';
        if (role !== 'Admin') {
            alert('Access Denied: Admin only');
            window.location.href = 'dashboard.html';
        }

        document.getElementById('user-name').innerText = userName || '--';
        document.getElementById('user-role').innerText = role || '--';

        // ====== Data ======
        let usersData = [];
        let currentPage = 1;
        const rowsPerPage = 8;

        // بيانات تجريبية
        const sampleUsers = [
            { user_id: 1, username: 'Admin Sara', email: 'sara@police.gov', role: 'Admin', created_at: '2025-01-01' },
            { user_id: 2, username: 'Analyst Ahmed', email: 'ahmed@police.gov', role: 'Analyst', created_at: '2025-01-05' },
            { user_id: 3, username: 'Officer Bayan', email: 'bayan@police.gov', role: 'Officer', created_at: '2025-01-10' },
            { user_id: 4, username: 'Officer Khalid', email: 'khalid@police.gov', role: 'Officer', created_at: '2025-01-12' },
            { user_id: 5, username: 'Analyst Noura', email: 'noura@police.gov', role: 'Analyst', created_at: '2025-01-15' },
        ];

        // ====== Load Users ======
        async function loadUsers() {
            try {
                const res = await fetch('http://localhost:3000/api/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) usersData = await res.json();
                else usersData = sampleUsers;
            } catch (e) {
                usersData = sampleUsers;
            }
            updateStats();
            renderUsers();
        }

        // ====== Stats ======
        function updateStats() {
            document.getElementById('stat-total').innerText = usersData.length;
            document.getElementById('stat-admins').innerText = usersData.filter(u => u.role === 'Admin').length;
            document.getElementById('stat-analysts').innerText = usersData.filter(u => u.role === 'Analyst').length;
            document.getElementById('stat-officers').innerText = usersData.filter(u => u.role === 'Officer').length;
        }

        // ====== Render Table ======
        function renderUsers() {
            const roleFilter = document.getElementById('filter-role').value;
            const search = document.getElementById('filter-search').value.toLowerCase();

            let filtered = usersData.filter(u => {
                const matchRole = roleFilter === 'all' || u.role === roleFilter;
                const matchSearch = !search ||
                    (u.username || '').toLowerCase().includes(search) ||
                    (u.email || '').toLowerCase().includes(search);
                return matchRole && matchSearch;
            });

            const start = (currentPage - 1) * rowsPerPage;
            const pageData = filtered.slice(start, start + rowsPerPage);
            const tbody = document.getElementById('users-body');

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-users-slash"></i>No users found</div></td></tr>`;
                return;
            }

            tbody.innerHTML = pageData.map(user => {
                const roleBadge = {
                    'Admin': 'badge-admin',
                    'Analyst': 'badge-analyst',
                    'Officer': 'badge-officer'
                }[user.role] || 'badge-officer';

                const date = (user.created_at || '').substring(0, 10);

                return `<tr>
                    <td style="color:var(--text-dim)">${user.user_id}</td>
                    <td style="color:white"><i class="fas fa-user" style="margin-right:8px; color:var(--text-dim)"></i>${user.username}</td>
                    <td>${user.email}</td>
                    <td><span class="badge ${roleBadge}">${user.role}</span></td>
                    <td>${date}</td>
                    <td>
                        <button class="btn-action" onclick="openEditModal(${user.user_id})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteUser(${user.user_id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('users-page-info').innerText =
                `Showing ${start + 1}–${Math.min(start + rowsPerPage, filtered.length)} of ${filtered.length}`;
            document.getElementById('users-prev').disabled = currentPage === 1;
            document.getElementById('users-next').disabled = (start + rowsPerPage) >= filtered.length;
        }

        function changePage(step) { currentPage += step; renderUsers(); }

        // ====== Modal ======
        function openAddModal() {
            document.getElementById('modal-title').innerText = 'Add New User';
            document.getElementById('edit-user-id').value = '';
            document.getElementById('modal-name').value = '';
            document.getElementById('modal-email').value = '';
            document.getElementById('modal-role').value = 'Officer';
            document.getElementById('modal-password').value = '';
            document.getElementById('password-field').style.display = 'block';
            document.getElementById('modal-msg').innerText = '';
            document.getElementById('user-modal').classList.add('open');
        }

        function openEditModal(id) {
            const user = usersData.find(u => u.user_id === id);
            if (!user) return;
            document.getElementById('modal-title').innerText = 'Edit User';
            document.getElementById('edit-user-id').value = id;
            document.getElementById('modal-name').value = user.username;
            document.getElementById('modal-email').value = user.email;
            document.getElementById('modal-role').value = user.role;
            document.getElementById('password-field').style.display = 'none';
            document.getElementById('modal-msg').innerText = '';
            document.getElementById('user-modal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('user-modal').classList.remove('open');
        }

        async function saveUser() {
            const editId = document.getElementById('edit-user-id').value;
            const name = document.getElementById('modal-name').value;
            const email = document.getElementById('modal-email').value;
            const role = document.getElementById('modal-role').value;
            const password = document.getElementById('modal-password').value;
            const msg = document.getElementById('modal-msg');

            if (!name || !email) {
                msg.style.color = 'var(--neon-red)';
                msg.innerText = '⚠️ Name and email are required';
                return;
            }

            if (editId) {
                // تعديل مستخدم
                try {
                    const res = await fetch(`http://localhost:3000/api/users/${editId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ username: name, email, role })
                    });
                    if (res.ok) {
                        const idx = usersData.findIndex(u => u.user_id == editId);
                        if (idx !== -1) { usersData[idx].username = name; usersData[idx].email = email; usersData[idx].role = role; }
                    }
                } catch (e) {
                    const idx = usersData.findIndex(u => u.user_id == editId);
                    if (idx !== -1) { usersData[idx].username = name; usersData[idx].email = email; usersData[idx].role = role; }
                }
            } else {
                // إضافة مستخدم جديد
                if (!password) {
                    msg.style.color = 'var(--neon-red)';
                    msg.innerText = '⚠️ Password is required';
                    return;
                }
                try {
                    const res = await fetch('http://localhost:3000/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ username: name, email, password, role })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        usersData.push({ user_id: Date.now(), username: name, email, role, created_at: new Date().toISOString() });
                    } else {
                        msg.style.color = 'var(--neon-red)';
                        msg.innerText = '❌ ' + data.error;
                        return;
                    }
                } catch (e) {
                    usersData.push({ user_id: Date.now(), username: name, email, role, created_at: new Date().toISOString() });
                }
            }

            msg.style.color = 'var(--neon-green)';
            msg.innerText = '✅ Saved successfully!';
            updateStats();
            renderUsers();
            setTimeout(closeModal, 1000);
        }

        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            try {
                await fetch(`http://localhost:3000/api/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            } catch (e) {}
            usersData = usersData.filter(u => u.user_id !== id);
            updateStats();
            renderUsers();
        }

async function handleLogout() {
    try {
        await fetch('http://localhost:3000/api/logout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: localStorage.getItem('user_id') || 1 })
        });
    } catch(e) {}
    localStorage.removeItem('token');
    localStorage.removeItem('role');
    localStorage.removeItem('name');
    window.location.href = 'index.html';
}

        window.onload = loadUsers;
    </script>
</body>
</html>
