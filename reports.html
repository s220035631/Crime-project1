<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crime Intelligence - Professional Reports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { 
            --bg: #0b0e14; 
            --card-bg: rgba(22, 27, 34, 0.8); 
            --accent: #fbbf24;
            --neon-green: #2ecc71; 
            --neon-red: #ef4444;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1f29 0%, #0b0e14 100%);
            color: var(--text-main);
            margin: 0; display: flex; 
        }

        .icon-sidebar {
            width: 70px; height: 100vh; background: rgba(0,0,0,0.8); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 30px 0; border-right: 1px solid #30363d; position: fixed;
        }
        .icon-sidebar a { color: var(--text-dim); font-size: 22px; margin-bottom: 35px; cursor: pointer; transition: 0.3s; }
        .icon-sidebar a.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .report-container { margin-left: 90px; padding: 40px; width: calc(100% - 130px); }

        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .filter-panel { 
            background: var(--card-bg); padding: 20px; border-radius: 15px; 
            display: flex; gap: 15px; border: 1px solid #30363d; backdrop-filter: blur(10px); align-items: flex-end;
        }
        .f-group { display: flex; flex-direction: column; gap: 5px; position: relative; }
        .f-group label { font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        
        select, input { 
            background: #0d1117; border: 1px solid #30363d; color: #fff; 
            padding: 10px; border-radius: 8px; font-size: 13px; outline: none;
        }

        .date-input-wrapper { position: relative; display: flex; align-items: center; }
        input[type="date"] { padding-right: 30px; min-width: 150px; }

        .clear-date {
            position: absolute; right: 35px; color: var(--text-dim);
            cursor: pointer; font-size: 14px; transition: 0.3s; z-index: 10;
        }
        .clear-date:hover { color: var(--neon-red); }

        .time-query-input { width: 130px; text-align: center; border-color: var(--accent); }

        .btn-gen { 
            background: var(--accent); color: #000; border: none; 
            padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
            height: 40px;
        }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { 
            background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #30363d;
            border-left: 4px solid var(--accent);
        }
        .stat-box h3 { font-size: 11px; color: var(--text-dim); margin: 0; }
        .stat-box p { font-size: 24px; font-weight: bold; margin: 10px 0 0; }

        .glass-card { 
            background: var(--card-bg); border-radius: 15px; border: 1px solid #30363d; 
            padding: 20px; margin-bottom: 30px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--accent); font-size: 12px; border-bottom: 2px solid #30363d; }
        td { padding: 12px 15px; font-size: 13px; border-bottom: 1px solid #21262d; color: var(--text-dim); }

        .table-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .page-btns { display: flex; gap: 10px; }
        .btn-nav { 
            background: #1a1f29; border: 1px solid #30363d; color: #fff; 
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .viz-grid { display: grid; grid-template-columns: 2fr 1.2fr; gap: 20px; margin-bottom: 30px; }
        .viz-card { 
            background: var(--card-bg); padding: 25px; border-radius: 20px; 
            border: 1px solid #30363d; height: 350px; display: flex; flex-direction: column;
        }

        .export-btns { display: flex; gap: 10px; justify-content: flex-end; }
        
        .btn-exp { background: transparent; border: 1px solid #444; color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
        <div class="icon-sidebar">
        <a href="dashboard.html"><i class="fas fa-th-large"></i></a>
        <a href="reports.html" class="active"><i class="fas fa-chart-line"></i></a>
        <a href="logs.html"><i class="fas fa-shield-alt"></i></a>
        <a href="admin.html"><i class="fas fa-users-cog"></i></a>
        <a href="upload.html"><i class="fas fa-upload"></i></a>
        <a onclick="handleLogout()" style="margin-top:auto; color:var(--neon-red);"><i class="fas fa-power-off"></i></a>

    </div>

    <div class="report-container">
        <div class="header-flex">
            <h2 style="margin:0; font-weight: 300;">Intelligence <span style="color:var(--accent); font-weight: 800;">Analysis</span></h2>
            <div class="filter-panel">
                <div class="f-group">
                    <label>Category</label>
                    <select id="crime-type">
                        <option value="all">All Types</option>
                        <option value="controlled drugs">Drugs</option>
                        <option value="weapon">Weapons</option>
                        <option value="stolen">Theft</option>
                    </select>
                </div>
                
                <div class="f-group">
                    <label>Start Date</label>
                    <div class="date-input-wrapper">
                        <input type="date" id="start-date">
                        <i class="fas fa-times-circle clear-date" title="Clear Date" onclick="document.getElementById('start-date').value=''; applyFilters();"></i>
                    </div>
                </div>

                <div class="f-group">
                    <label>End Date</label>
                    <div class="date-input-wrapper">
                        <input type="date" id="end-date">
                        <i class="fas fa-times-circle clear-date" title="Clear Date" onclick="document.getElementById('end-date').value=''; applyFilters();"></i>
                    </div>
                </div>

                <div class="f-group">
                    <label>Time (Hour/Min)</label>
                    <input type="text" id="time-query" placeholder="e.g. 02 or 02:15" class="time-query-input">
                </div>

                <button class="btn-gen" onclick="applyFilters()">RUN ANALYSIS</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box"><h3>Total Records</h3><p id="count-total">0</p></div>
            <div class="stat-box" style="border-left-color: var(--neon-red);"><h3>High Risk</h3><p id="count-high">0</p></div>
            <div class="stat-box" style="border-left-color: var(--accent);"><h3>Med Risk</h3><p id="count-med">0</p></div>
            <div class="stat-box" style="border-left-color: var(--neon-green);"><h3>Low Risk</h3><p id="count-low">0</p></div>
        </div>

        <div class="glass-card">
            <h4 style="margin-top:0; font-size:14px; color:var(--text-dim);">DETAILED LOGS</h4>
            <table>
                <thead><tr><th>TIMELINE</th><th>TYPE</th><th>RISK</th><th>COORDINATES</th></tr></thead>
                <tbody id="report-body"></tbody>
            </table>
            <div class="table-footer">
                <span id="page-info" style="font-size: 11px; color: var(--text-dim);">Showing 0-0 of 0</span>
                <div class="page-btns">
                    <button id="prevBtn" class="btn-nav" onclick="changePage(-1)"><i class="fas fa-chevron-left"></i></button>
                    <button id="nextBtn" class="btn-nav" onclick="changePage(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>

        <div class="viz-grid">
            <div class="viz-card"><canvas id="lineChart"></canvas></div>
            <div class="viz-card"><canvas id="doughnutChart"></canvas></div>
        </div>

        <div class="export-btns">
            <button class="btn-exp" onclick="exportToExcel()">Excel Export</button>
            <button class="btn-exp" onclick="exportToPDF()">PDF Export</button>
        </div>
    </div>

    <script>
        let allData = [], filteredData = [], charts = {};
        let currentPage = 1;
        const rowsPerPage = 8;

        async function loadData() {
            try {
                const res = await fetch('https://crime-project1.onrender.com/api/latest-data');
        
                if (res.ok) {
                    const rows = await res.json();
                    allData = rows.map(row => [{
                        properties: {
                            latitude: parseFloat(row.latitude),
                            longitude: parseFloat(row.longitude),
                            datetime: row.datetime,
                            object_of_search: row.object_of_search || 'Unknown',
                            risk_level: parseFloat(row.risk_level) || 1
                        }
                    }]);
                } else {
                    const fallback = await fetch('kepler.gl.json');
                    const json = await fallback.json();
                    allData = json.datasets[0].data.allData;
                }
        
               applyFilters();
            } catch(e) {
                try {
                    const fallback = await fetch('kepler.gl.json');
                    const json = await fallback.json();
                    allData = json.datasets[0].data.allData;
                    applyFilters();
                } catch(e2) { console.error(e2); }
            }
        }

        function applyFilters() {
            currentPage = 1;
            const type = document.getElementById('crime-type').value;
            const start = document.getElementById('start-date').value;
            const end = document.getElementById('end-date').value;
            const timeQuery = document.getElementById('time-query').value.trim();

            filteredData = allData.filter(row => {
                const p = row[0].properties;
                const [rDate, rFullTime] = p.datetime.split('T');
                const rTime = rFullTime.substring(0, 5);
                const cType = (p.object_of_search || '').toLowerCase();
                
                let isMatch = (type === 'all' || cType.includes(type)) && 
                              (!start || rDate >= start) && 
                              (!end || rDate <= end);

                if (timeQuery) {
                    let formattedQuery = timeQuery.padStart(2, '0');
                    if (!rTime.startsWith(formattedQuery)) isMatch = false;
                }
                return isMatch;
            });
            updateUI();
        }

        function updateUI() {
            document.getElementById('count-total').innerText = filteredData.length.toLocaleString();
            document.getElementById('count-high').innerText = filteredData.filter(r => r[0].properties.risk_level >= 4).length;
            document.getElementById('count-med').innerText = filteredData.filter(r => r[0].properties.risk_level == 3).length;
            document.getElementById('count-low').innerText = filteredData.filter(r => r[0].properties.risk_level <= 2).length;
            renderTable();
            updateCharts();
        }

        function renderTable() {
            const tbody = document.getElementById('report-body');
            const startIdx = (currentPage - 1) * rowsPerPage;
            const pageData = filteredData.slice(startIdx, startIdx + rowsPerPage);

            tbody.innerHTML = pageData.map(row => {
                const p = row[0].properties;
                const riskColor = p.risk_level >= 4 ? 'var(--neon-red)' : (p.risk_level == 3 ? 'var(--accent)' : 'var(--neon-green)');
                return `<tr>
                    <td>${p.datetime.replace('T', ' ').substring(0, 16)}</td>
                    <td>${p.object_of_search}</td>
                    <td style="color:${riskColor}">${p.risk_level}</td>
                    <td>${p.latitude.toFixed(3)}, ${p.longitude.toFixed(3)}</td>
                </tr>`;
            }).join('');

            document.getElementById('page-info').innerText = `Showing ${filteredData.length > 0 ? startIdx + 1 : 0}-${Math.min(startIdx + rowsPerPage, filteredData.length)} of ${filteredData.length}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = (startIdx + rowsPerPage) >= filteredData.length;
        }

        function changePage(step) { currentPage += step; renderTable(); }

        function updateCharts() {
            const ctxLine = document.getElementById('lineChart').getContext('2d');
            const ctxDoughnut = document.getElementById('doughnutChart').getContext('2d');

            if(charts.line) charts.line.destroy();
            if(charts.doughnut) charts.doughnut.destroy();

            const trendData = {};
            filteredData.forEach(row => {
                const date = row[0].properties.datetime.split('T')[0];
                const risk = row[0].properties.risk_level;
                if(!trendData[date]) trendData[date] = { high: 0, med: 0, low: 0 };
                if(risk >= 4) trendData[date].high++;
                else if(risk == 3) trendData[date].med++;
                else trendData[date].low++;
            });

            const sortedDates = Object.keys(trendData).sort().slice(-10);

            charts.line = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: sortedDates,
                    datasets: [
                        { label: 'High', data: sortedDates.map(d => trendData[d].high), borderColor: '#ef4444', tension: 0.4, borderWidth: 2, fill: false },
                        { label: 'Med', data: sortedDates.map(d => trendData[d].med), borderColor: '#fbbf24', tension: 0.4, borderWidth: 2, fill: false },
                        { label: 'Low', data: sortedDates.map(d => trendData[d].low), borderColor: '#2ecc71', tension: 0.4, borderWidth: 2, fill: false }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            charts.doughnut = new Chart(ctxDoughnut, {
                type: 'doughnut',
                data: {
                    labels: ['High', 'Med', 'Low'],
                    datasets: [{ 
                        data: [
                            filteredData.filter(r => r[0].properties.risk_level >= 4).length,
                            filteredData.filter(r => r[0].properties.risk_level == 3).length,
                            filteredData.filter(r => r[0].properties.risk_level <= 2).length
                        ], 
                        backgroundColor: ['#ef4444', '#fbbf24', '#2ecc71'], 
                        borderWidth: 0 
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%' }
            });
        }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(filteredData.map(r => r[0].properties));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Security_Report");
            XLSX.writeFile(wb, "Report.xlsx");
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Security Intelligence Report", 14, 15);
            doc.autoTable({ head: [['Timeline', 'Type', 'Risk']], body: filteredData.slice(0, 20).map(r => [r[0].properties.datetime.replace('T', ' '), r[0].properties.object_of_search, r[0].properties.risk_level]) });
            doc.save("Report.pdf");
        }
async function handleLogout() {
    try {
        await fetch('https://crime-project1.onrender.com/api/logout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: localStorage.getItem('user_id') || 1 })
        });
    } catch(e) {}
    localStorage.removeItem('token');
    localStorage.removeItem('role');
    localStorage.removeItem('name');
    window.location.href = 'index.html';
}

window.onload = function() {
    // فحص تسجيل الدخول
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    const userName = localStorage.getItem('name');

    if (!token) {
        window.location.href = 'index.html';
        return;
    }

    // إخفاء زر Export للـ Officer
    if (role === 'Officer') {
        document.querySelector('.export-btns').style.display = 'none';
    }

    loadData();
};

    </script>
</body>
</html>
