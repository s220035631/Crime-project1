<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Intelligence - Logs & Alerts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: rgba(22, 27, 34, 0.8);
            --accent: #fbbf24;
            --neon-red: #ef4444;
            --neon-green: #2ecc71;
            --neon-blue: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1f29 0%, #0b0e14 100%);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .icon-sidebar {
            width: 70px; height: 100vh; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 0; border-right: 1px solid #30363d;
            position: fixed; left: 0; top: 0; z-index: 100;
        }
        .icon-sidebar a {
            color: var(--text-dim); font-size: 22px;
            margin-bottom: 35px; cursor: pointer; transition: 0.3s; text-decoration: none;
        }
        .icon-sidebar a.active,
        .icon-sidebar a:hover { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .icon-sidebar a.logout { margin-top: auto; margin-bottom: 20px; color: var(--neon-red) !important; }

        /* Main Content */
        .main-content {
            margin-left: 70px;
            padding: 40px;
            width: calc(100% - 70px);
        }

        /* Header */
        .page-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 30px;
        }
        .page-header h2 {
            font-size: 1.6rem; font-weight: 300; letter-spacing: 1px;
        }
        .page-header h2 span { color: var(--accent); font-weight: 800; }

        .user-badge {
            background: var(--card-bg); border: 1px solid #30363d;
            border-radius: 20px; padding: 8px 16px;
            font-size: 12px; color: var(--text-dim);
        }
        .user-badge span { color: var(--accent); }

        /* Stats */
        .stats-row {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; margin-bottom: 30px;
        }
        .stat-box {
            background: var(--card-bg); padding: 20px;
            border-radius: 15px; border: 1px solid #30363d;
            border-left: 4px solid var(--accent);
            transition: transform 0.2s;
        }
        .stat-box:hover { transform: translateY(-3px); }
        .stat-box h3 { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .stat-box p { font-size: 28px; font-weight: bold; margin-top: 8px; }

        /* Tabs */
        .tabs {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .tab-btn {
            background: var(--card-bg); border: 1px solid #30363d;
            color: var(--text-dim); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-size: 13px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--accent); color: #000;
            border-color: var(--accent); font-weight: bold;
        }

        /* Filter Bar */
        .filter-bar {
            background: var(--card-bg); padding: 15px 20px;
            border-radius: 12px; border: 1px solid #30363d;
            display: flex; gap: 15px; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .filter-bar label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: bold; }
        .filter-bar select, .filter-bar input {
            background: #0d1117; border: 1px solid #30363d;
            color: #fff; padding: 8px 12px; border-radius: 8px;
            font-size: 12px; outline: none;
        }
        .btn-filter {
            background: var(--accent); color: #000; border: none;
            padding: 8px 18px; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 12px;
        }

        /* Tables */
        .glass-card {
            background: var(--card-bg); border-radius: 15px;
            border: 1px solid #30363d; padding: 20px;
            margin-bottom: 30px;
        }
        .glass-card h4 {
            font-size: 12px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 15px;
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 12px 15px;
            color: var(--accent); font-size: 11px;
            border-bottom: 2px solid #30363d; text-transform: uppercase;
        }
        td {
            padding: 12px 15px; font-size: 13px;
            border-bottom: 1px solid #21262d; color: var(--text-dim);
        }
        tr:hover td { background: rgba(255,255,255,0.02); }

        /* Badges */
        .badge {
            padding: 3px 10px; border-radius: 20px;
            font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
        .badge-login { background: rgba(46,204,113,0.15); color: var(--neon-green); }
        .badge-logout { background: rgba(239,68,68,0.15); color: var(--neon-red); }
        .badge-upload { background: rgba(59,130,246,0.15); color: var(--neon-blue); }
        .badge-report { background: rgba(251,191,36,0.15); color: var(--accent); }

        .badge-unread { background: rgba(239,68,68,0.15); color: var(--neon-red); }
        .badge-read { background: rgba(139,148,158,0.15); color: var(--text-dim); }
        .badge-warning { background: rgba(251,191,36,0.15); color: var(--accent); }
        .badge-error { background: rgba(239,68,68,0.2); color: var(--neon-red); }
        .badge-info { background: rgba(59,130,246,0.15); color: var(--neon-blue); }

        /* Pagination */
        .table-footer {
            display: flex; justify-content: space-between;
            align-items: center; margin-top: 15px;
        }
        .page-btns { display: flex; gap: 8px; }
        .btn-nav {
            background: #1a1f29; border: 1px solid #30363d; color: #fff;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Alert Mark Read Button */
        .btn-mark {
            background: transparent; border: 1px solid #30363d;
            color: var(--text-dim); padding: 4px 10px;
            border-radius: 6px; cursor: pointer; font-size: 11px;
            transition: 0.2s;
        }
        .btn-mark:hover { border-color: var(--neon-green); color: var(--neon-green); }

        /* Empty State */
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-dim);
        }
        .empty-state i { font-size: 40px; margin-bottom: 15px; opacity: 0.3; }

        /* Tab Panels */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Live indicator */
        .live-dot {
            display: inline-block; width: 8px; height: 8px;
            background: var(--neon-green); border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="icon-sidebar">
        <a href="dashboard.html"><i class="fas fa-th-large"></i></a>
        <a href="reports.html"><i class="fas fa-chart-line"></i></a>
        <a href="logs.html" class="active"><i class="fas fa-shield-alt"></i></a>
        <a href="admin.html"><i class="fas fa-users-cog"></i></a>
        <a href="upload.html"><i class="fas fa-upload"></i></a>
        <a class="logout" onclick="handleLogout()"><i class="fas fa-power-off"></i></a>
    </div>

    <!-- Main -->
    <div class="main-content">

        <!-- Header -->
        <div class="page-header">
            <h2>SYSTEM <span>LOGS & ALERTS</span></h2>
            <div class="user-badge">
                👤 <span id="user-name">--</span> &nbsp;|&nbsp; 🔑 <span id="user-role">--</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-box">
                <h3>Total Logs</h3>
                <p id="stat-total-logs">0</p>
            </div>
            <div class="stat-box" style="border-left-color: var(--neon-green);">
                <h3>Login Events</h3>
                <p id="stat-logins">0</p>
            </div>
            <div class="stat-box" style="border-left-color: var(--neon-red);">
                <h3>Unread Alerts</h3>
                <p id="stat-unread">0</p>
            </div>
            <div class="stat-box" style="border-left-color: var(--neon-blue);">
                <h3>Active Users</h3>
                <p id="stat-active">0</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('logs')">
                <span class="live-dot"></span> Activity Logs
            </button>
            <button class="tab-btn" onclick="switchTab('alerts')">
                🔔 Alerts
            </button>
        </div>

        <!-- LOGS TAB -->
        <div class="tab-panel active" id="tab-logs">
            <div class="filter-bar">
                <div>
                    <label>Action Type</label><br>
                    <select id="log-filter-action">
                        <option value="all">All Actions</option>
                        <option value="LOGIN">Login</option>
                        <option value="LOGOUT">Logout</option>
                        <option value="UPLOAD">Upload</option>
                        <option value="REPORT">Report</option>
                    </select>
                </div>
                <div>
                    <label>Search User</label><br>
                    <input type="text" id="log-filter-user" placeholder="Username...">
                </div>
                <button class="btn-filter" onclick="renderLogs()">Filter</button>
                <button class="btn-filter" style="background:transparent; border:1px solid #30363d; color:#fff;" onclick="clearLogFilters()">Clear</button>
            </div>

            <div class="glass-card">
                <h4>📋 Activity Log</h4>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>User</th>
                            <th>Action</th>
                            <th>Time</th>
                            <th>IP</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        <tr><td colspan="5"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><br>Loading...</div></td></tr>
                    </tbody>
                </table>
                <div class="table-footer">
                    <span id="logs-page-info" style="font-size:11px; color:var(--text-dim);">Showing 0 of 0</span>
                    <div class="page-btns">
                        <button class="btn-nav" id="logs-prev" onclick="changeLogsPage(-1)" disabled><i class="fas fa-chevron-left"></i></button>
                        <button class="btn-nav" id="logs-next" onclick="changeLogsPage(1)" disabled><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ALERTS TAB -->
        <div class="tab-panel" id="tab-alerts">
            <div class="filter-bar">
                <div>
                    <label>Status</label><br>
                    <select id="alert-filter-status">
                        <option value="all">All</option>
                        <option value="unread">Unread</option>
                        <option value="read">Read</option>
                    </select>
                </div>
                <div>
                    <label>Type</label><br>
                    <select id="alert-filter-type">
                        <option value="all">All Types</option>
                        <option value="warning">Warning</option>
                        <option value="error">Error</option>
                        <option value="info">Info</option>
                    </select>
                </div>
                <button class="btn-filter" onclick="renderAlerts()">Filter</button>
                <button class="btn-filter" onclick="markAllRead()" style="background:transparent; border:1px solid var(--neon-green); color:var(--neon-green);">
                    ✓ Mark All Read
                </button>
            </div>

            <div class="glass-card">
                <h4>🔔 System Alerts</h4>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Message</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Time</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="alerts-body">
                        <tr><td colspan="6"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><br>Loading...</div></td></tr>
                    </tbody>
                </table>
                <div class="table-footer">
                    <span id="alerts-page-info" style="font-size:11px; color:var(--text-dim);">Showing 0 of 0</span>
                    <div class="page-btns">
                        <button class="btn-nav" id="alerts-prev" onclick="changeAlertsPage(-1)" disabled><i class="fas fa-chevron-left"></i></button>
                        <button class="btn-nav" id="alerts-next" onclick="changeAlertsPage(1)" disabled><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ====== Auth Check ======
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        const userName = localStorage.getItem('name');

        if (!token) window.location.href = 'index.html';
        if (role !== 'Admin') {
            // غير الأدمن ما يدخل هذه الصفحة
            alert('Access Denied: Admin only');
            window.location.href = 'dashboard.html';
        }

        document.getElementById('user-name').innerText = userName || '--';
        document.getElementById('user-role').innerText = role || '--';

        // ====== Data ======
        let logsData = [], alertsData = [];
        let logsPage = 1, alertsPage = 1;
        const rowsPerPage = 10;

        // بيانات تجريبية ريثما يُربط السيرفر
        const sampleLogs = [
            { log_id: 1, username: 'Officer Bayan', action: 'LOGIN', log_time: '2025-01-15 08:30:00', ip: '192.168.1.10' },
            { log_id: 2, username: 'Admin Sara', action: 'UPLOAD', log_time: '2025-01-15 09:15:00', ip: '192.168.1.5' },
            { log_id: 3, username: 'Analyst Ahmed', action: 'REPORT', log_time: '2025-01-15 10:00:00', ip: '192.168.1.20' },
            { log_id: 4, username: 'Officer Bayan', action: 'LOGOUT', log_time: '2025-01-15 12:00:00', ip: '192.168.1.10' },
            { log_id: 5, username: 'Admin Sara', action: 'LOGIN', log_time: '2025-01-16 08:00:00', ip: '192.168.1.5' },
            { log_id: 6, username: 'Analyst Ahmed', action: 'LOGIN', log_time: '2025-01-16 09:30:00', ip: '192.168.1.20' },
            { log_id: 7, username: 'Officer Bayan', action: 'LOGIN', log_time: '2025-01-16 10:15:00', ip: '192.168.1.10' },
            { log_id: 8, username: 'Admin Sara', action: 'REPORT', log_time: '2025-01-16 11:00:00', ip: '192.168.1.5' },
        ];

        const sampleAlerts = [
            { alert_id: 1, message: 'Failed login attempt detected', type: 'error', status: 'unread', created_at: '2025-01-15 08:25:00' },
            { alert_id: 2, message: 'Large file uploaded (50MB)', type: 'warning', status: 'unread', created_at: '2025-01-15 09:15:00' },
            { alert_id: 3, message: 'New user registered: Officer Bayan', type: 'info', status: 'read', created_at: '2025-01-15 07:00:00' },
            { alert_id: 4, message: 'Database backup completed', type: 'info', status: 'read', created_at: '2025-01-14 23:00:00' },
            { alert_id: 5, message: 'High risk incidents spike detected', type: 'error', status: 'unread', created_at: '2025-01-16 10:00:00' },
        ];

        // ====== Load Data ======
        async function loadData() {
            try {
                // محاولة جلب البيانات من السيرفر
                const [logsRes, alertsRes] = await Promise.all([
                    fetch('https://crime-project1.onrender.com/api/logs', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch('https://crime-project1.onrender.com/api/alerts', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                if (logsRes.ok) logsData = await logsRes.json();
                else logsData = sampleLogs;

                if (alertsRes.ok) alertsData = await alertsRes.json();
                else alertsData = sampleAlerts;

            } catch (e) {
                // إذا السيرفر ما رد، استخدم البيانات التجريبية
                logsData = sampleLogs;
                alertsData = sampleAlerts;
            }

            updateStats();
            renderLogs();
            renderAlerts();
        }

        // ====== Stats ======
        function updateStats() {
            document.getElementById('stat-total-logs').innerText = logsData.length;
            document.getElementById('stat-logins').innerText = logsData.filter(l => l.action === 'LOGIN').length;
            document.getElementById('stat-unread').innerText = alertsData.filter(a => a.status === 'unread').length;
            const uniqueUsers = new Set(logsData.map(l => l.username)).size;
            document.getElementById('stat-active').innerText = uniqueUsers;
        }

        // ====== Logs ======
        function renderLogs() {
            const actionFilter = document.getElementById('log-filter-action').value;
            const userFilter = document.getElementById('log-filter-user').value.toLowerCase();

            let filtered = logsData.filter(l => {
                const matchAction = actionFilter === 'all' || l.action === actionFilter;
                const matchUser = !userFilter || (l.username || '').toLowerCase().includes(userFilter);
                return matchAction && matchUser;
            });

            const start = (logsPage - 1) * rowsPerPage;
            const pageData = filtered.slice(start, start + rowsPerPage);
            const tbody = document.getElementById('logs-body');

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="fas fa-inbox"></i><br>No logs found</div></td></tr>`;
                return;
            }

            tbody.innerHTML = pageData.map(log => {
                const badgeClass = {
                    'LOGIN': 'badge-login', 'LOGOUT': 'badge-logout',
                    'UPLOAD': 'badge-upload', 'REPORT': 'badge-report'
                }[log.action] || 'badge-info';

                return `<tr>
                    <td style="color:var(--text-dim)">${log.log_id}</td>
                    <td style="color:white">${log.username || 'Unknown'}</td>
                    <td><span class="badge ${badgeClass}">${log.action}</span></td>
                    <td>${log.log_time}</td>
                    <td>${log.ip || '—'}</td>
                </tr>`;
            }).join('');

            document.getElementById('logs-page-info').innerText =
                `Showing ${start + 1}–${Math.min(start + rowsPerPage, filtered.length)} of ${filtered.length}`;
            document.getElementById('logs-prev').disabled = logsPage === 1;
            document.getElementById('logs-next').disabled = (start + rowsPerPage) >= filtered.length;
        }

        function changeLogsPage(step) { logsPage += step; renderLogs(); }
        function clearLogFilters() {
            document.getElementById('log-filter-action').value = 'all';
            document.getElementById('log-filter-user').value = '';
            logsPage = 1;
            renderLogs();
        }

        // ====== Alerts ======
        function renderAlerts() {
            const statusFilter = document.getElementById('alert-filter-status').value;
            const typeFilter = document.getElementById('alert-filter-type').value;

            let filtered = alertsData.filter(a => {
                const matchStatus = statusFilter === 'all' || a.status === statusFilter;
                const matchType = typeFilter === 'all' || a.type === typeFilter;
                return matchStatus && matchType;
            });

            const start = (alertsPage - 1) * rowsPerPage;
            const pageData = filtered.slice(start, start + rowsPerPage);
            const tbody = document.getElementById('alerts-body');

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-bell-slash"></i><br>No alerts found</div></td></tr>`;
                return;
            }

            tbody.innerHTML = pageData.map(alert => {
                const typeBadge = {
                    'warning': 'badge-warning', 'error': 'badge-error', 'info': 'badge-info'
                }[alert.type] || 'badge-info';

                const statusBadge = alert.status === 'unread' ? 'badge-unread' : 'badge-read';

                return `<tr>
                    <td style="color:var(--text-dim)">${alert.alert_id}</td>
                    <td style="color:white">${alert.message}</td>
                    <td><span class="badge ${typeBadge}">${alert.type}</span></td>
                    <td><span class="badge ${statusBadge}">${alert.status}</span></td>
                    <td>${alert.created_at}</td>
                    <td>
                        ${alert.status === 'unread'
                            ? `<button class="btn-mark" onclick="markRead(${alert.alert_id})">Mark Read</button>`
                            : '—'}
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('alerts-page-info').innerText =
                `Showing ${start + 1}–${Math.min(start + rowsPerPage, filtered.length)} of ${filtered.length}`;
            document.getElementById('alerts-prev').disabled = alertsPage === 1;
            document.getElementById('alerts-next').disabled = (start + rowsPerPage) >= filtered.length;
        }

        function changeAlertsPage(step) { alertsPage += step; renderAlerts(); }

        function markRead(id) {
            const alert = alertsData.find(a => a.alert_id === id);
            if (alert) {
                alert.status = 'read';
                updateStats();
                renderAlerts();
            }
        }

        function markAllRead() {
            alertsData.forEach(a => a.status = 'read');
            updateStats();
            renderAlerts();
        }

        // ====== Tabs ======
        function switchTab(tab) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
        }

        // ====== Logout ======
async function handleLogout() {
    try {
        await fetch('https://crime-project1.onrender.com/api/logout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: localStorage.getItem('user_id') || 1 })
        });
    } catch(e) {}
    localStorage.removeItem('token');
    localStorage.removeItem('role');
    localStorage.removeItem('name');
    window.location.href = 'index.html';
}

        // ====== Init ======
        window.onload = loadData;
    </script>
</body>
</html>
