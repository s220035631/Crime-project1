<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Intelligence - Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    
    <style>
        :root { 
            --bg: #0b0e14; 
            --card-bg: rgba(22, 27, 34, 0.8); 
            --accent: #fbbf24; 
            --neon-red: #ef4444; 
            --neon-green: #2ecc71; 
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --calendar-main: #7c4dff;
        }

        /* تعديل: إضافة !important لمنع أي ظهور مفاجئ لشريط التمرير */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #1a1f29 0%, #0b0e14 100%);
            color: var(--text-main); 
            overflow: hidden !important; 
        }

        /* تعديل: ضمان أن الحاوية الرئيسية لا تتجاوز حجم الشاشة */
        .main-layout { 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden !important; 
        }

        .icon-sidebar {
            width: 70px; background: rgba(0,0,0,0.8); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 30px 0; border-right: 1px solid #30363d; flex-shrink: 0;
        }
        .icon-sidebar a { color: var(--text-dim); font-size: 22px; margin-bottom: 35px; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .icon-sidebar a.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .sidebar {
            width: 320px; background: var(--card-bg); padding: 20px; 
            border-right: 1px solid #30363d; display: flex; flex-direction: column; 
            flex-shrink: 0; backdrop-filter: blur(10px); overflow-y: auto;
        }

        /* تحسين شكل سكرول بار الجانبي (اختياري) ليكون متناسقاً */
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .sidebar h2 { font-weight: 300; font-size: 1.1rem; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase;}
        .sidebar h2 span { color: var(--accent); font-weight: 800; }

        .stat-box { 
            background: rgba(13, 17, 23, 0.6); padding: 12px; border-radius: 10px; 
            border: 1px solid #30363d; margin-bottom: 12px;
            border-left: 4px solid var(--accent);
        }
        .stat-box h3 { font-size: 9px; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 1px;}
        .stat-box p { font-size: 18px; font-weight: bold; margin: 5px 0 0; }

        .filter-group { margin-top: 12px; }
        .filter-group label { display: block; margin-bottom: 6px; font-size: 10px; color: var(--text-dim); font-weight: bold; text-transform: uppercase;}
        
        select, input {
            width: 100%; padding: 10px; background: #0d1117; 
            border: 1px solid #30363d; color: #fff; border-radius: 8px; 
            font-size: 12px; outline: none; box-sizing: border-box;
        }

        .clear-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            color: var(--text-dim); cursor: pointer; font-size: 14px; transition: 0.3s;
            display: none;
        }
        .clear-btn:hover { color: var(--neon-red); }

        .btn-update {
            background: var(--accent); color: #000; border: none; padding: 12px;
            border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; 
            font-size: 12px; margin-top: 15px; transition: 0.3s; text-transform: uppercase;
        }

        #map { flex-grow: 1; background: #0b0e14; height: 100%; }

        .flatpickr-calendar {
            background: #1a1f29 !important;
            border: 1px solid #30363d !important;
            border-radius: 12px !important;
            width: 250px !important;
        }
        .flatpickr-day.selected { background: var(--calendar-main) !important; border-color: var(--calendar-main) !important; }

        .chart-container { 
            margin-top: 20px; background: rgba(13, 17, 23, 0.4); 
            padding: 10px; border-radius: 8px; border: 1px solid #30363d; height: 160px;
        }

        .leaflet-popup-content-wrapper {
            background: #0d1117 !important;
            color: #ffffff !important;
            border-radius: 8px !important;
            padding: 5px !important;
            border: 1px solid #30363d;
        }
        .leaflet-popup-tip { background: #0d1117 !important; }
        .popup-container { min-width: 220px; padding: 5px; }
        .popup-header-custom {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px;
        }
        .popup-title { font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .popup-badge { color: white; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: bold; }
        .popup-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; color: #e6edf3; }
        .popup-row i { color: #8b949e; width: 16px; text-align: center; }
        .popup-row b { color: #ffffff; margin-right: 4px; }
    </style>
</head>
<body>
    <div class="main-layout">
        <div class="icon-sidebar">
                <a href="dashboard.html" class="active"><i class="fas fa-th-large"></i></a>
                <a href="reports.html"><i class="fas fa-chart-line"></i></a>
                <a href="logs.html"><i class="fas fa-shield-alt"></i></a>
                <a href="admin.html"><i class="fas fa-users-cog"></i></a>
                <a href="upload.html"><i class="fas fa-upload"></i></a>
                <a href="predicted.html"><i class="fas fa-brain"></i></a>
                <a onclick="handleLogout()" style="margin-top:auto; color:var(--neon-red);"><i class="fas fa-power-off"></i></a>
        </div>

        <aside class="sidebar">
            <h2>SYSTEM <span>ANALYSIS</span></h2>
            <p style="font-size:11px; color:var(--text-dim); margin:0 0 15px 0;">
                👤 <span id="user-name-display"></span> 
                &nbsp;|&nbsp; 
                🔑 <span id="user-role-display"></span>
            </p>
            
            <div class="stat-box">
                <h3>Total Records</h3><p id="total-count">0</p>
            </div>
            <div class="stat-box" style="border-left-color: var(--neon-red);">
                <h3>High Risk Units</h3><p id="high-risk-count">0</p>
            </div>
            <div class="stat-box" style="border-left-color: #3498db;"> 
                <h3>AI Precision</h3>
                <p>94.8%</p>
            </div>

            <div class="filter-group">
                <label>Crime Category</label>
                <select id="crime-type">
                    <option value="all">All Intelligence</option>
                    <option value="controlled drugs">Drugs</option>
                    <option value="weapon">Weapon</option>
                    <option value="stolen">Theft</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Select Date</label>
                <div class="input-wrapper" style="position: relative;">
                    <input type="text" id="filter-date" placeholder="YYYY-MM-DD" readonly>
                    <i class="fas fa-times-circle clear-btn" id="clear-date" onclick="clearInput('filter-date')"></i>
                </div>
            </div>

            <div class="filter-group">
                <label>Time (HH:MM)</label>
                <div class="input-wrapper" style="position: relative;">
                    <input type="text" id="filter-time" placeholder="Ex: 14:30">
                    <i class="fas fa-times-circle clear-btn" id="clear-time" onclick="clearInput('filter-time')"></i>
                </div>
            </div>

            <button class="btn-update" onclick="applyFilters()">Run Analysis</button>

            <div class="chart-container">
                <canvas id="crimeChart"></canvas>
            </div>
        </aside>

        <main id="map"></main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        const datePick = flatpickr("#filter-date", {
            dateFormat: "Y-m-d",
            onChange: function(selectedDates, dateStr) {
                document.getElementById('clear-date').style.display = dateStr ? 'block' : 'none';
            }
        });

        document.getElementById('filter-time').addEventListener('input', function(e) {
            document.getElementById('clear-time').style.display = e.target.value ? 'block' : 'none';
        });

        function clearInput(id) {
            const el = document.getElementById(id);
            el.value = "";
            if(id === 'filter-date') datePick.clear();
            document.getElementById('clear-' + id.split('-')[1]).style.display = 'none';
            applyFilters();
        }

        // ====== فحص الصلاحيات ======
const token = localStorage.getItem('token');
const role = localStorage.getItem('role');
const userName = localStorage.getItem('name');

// إذا مو مسجل دخول، ارجع لصفحة Login
if (!token) {
    window.location.href = 'index.html';
}

// إخفاء العناصر حسب الدور
window.addEventListener('DOMContentLoaded', function() {
    if (role === 'Officer') {
        // الضابط ما يشوف Reports
        const reportsLink = document.querySelector('a[href="reports.html"]');
        if (reportsLink) reportsLink.style.display = 'none';
    }

    if (role !== 'Admin') {
        // غير الأدمن ما يشوف Logs
        const logsLink = document.getElementById('logs-link');
        if (logsLink) logsLink.style.display = 'none';
    }

// عرض اسم المستخدم والدور
document.getElementById('user-name-display').innerText = userName || 'Unknown';
document.getElementById('user-role-display').innerText = role || 'Unknown';
});
// ============================

        // إعداد الخريطة
        var map = L.map('map', { 
            zoomControl: false,
            attributionControl: false // إزالة حقوق الملكية لتقليل الزحام
        }).setView([51.505, -0.12], 11);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // تعديل: حل جذري لمشكلة شريط التمرير عند التحميل
        window.onload = function() {
            loadData();
            setTimeout(() => { map.invalidateSize(); }, 200);
        };

        let markersLayer = L.layerGroup().addTo(map);
        let allDataRaw = [], myChart = null;

        async function loadData() {
            try {
        // أولاً: نجرب نجيب البيانات من آخر ملف مرفوع
                const res = await fetch('https://crime-project1.onrender.com/api/latest-data');
        
                if (res.ok) {
                    const rows = await res.json();
            // تحويل البيانات للصيغة المطلوبة
                    allDataRaw = rows.map(row => [{
                        properties: {
                            latitude: parseFloat(row.latitude),
                            longitude: parseFloat(row.longitude),
                            datetime: row.datetime,
                            object_of_search: row.object_of_search || 'Unknown',
                            risk_level: parseFloat(row.risk_level) || 1
                        }
                    }]);
                } else {
            // إذا ما فيه ملف مرفوع، نرجع للملف الأصلي
                    const fallback = await fetch('kepler.gl.json');
                    const json = await fallback.json();
                    allDataRaw = json.datasets[0].data.allData;
                }
        
                initChart();
                applyFilters();
            } catch(e) {
        // في حال أي خطأ، نرجع للملف الأصلي
                try {
                    const fallback = await fetch('kepler.gl.json');
                    const json = await fallback.json();
                    allDataRaw = json.datasets[0].data.allData;
                    initChart();
                    applyFilters();
                } catch(e2) { console.error(e2); }
            }
        }

        function initChart() {
            const ctx = document.getElementById('crimeChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Drugs', 'Weapon', 'Theft', 'Other'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: '#fbbf24',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e', font: {size: 9} } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e', font: {size: 9} } }
                    }
                }
            });
        }

        function applyFilters() {
            markersLayer.clearLayers();
            const type = document.getElementById('crime-type').value;
            const dateInput = document.getElementById('filter-date').value.trim();
            const timeInput = document.getElementById('filter-time').value.trim();
            
            let counts = {total: 0, high: 0};
            let chartData = { drugs: 0, weapon: 0, theft: 0, other: 0 };
            
            allDataRaw.forEach(row => {
                const p = row[0].properties;
                const cType = (p.object_of_search || '').toLowerCase();
                const [rDate, fullTime] = p.datetime.split('T');
                const rTime = fullTime ? fullTime.substring(0, 5) : "";

                let match = (type === 'all' || cType.includes(type));
                if (dateInput && rDate !== dateInput) match = false;
                if (timeInput && !rTime.includes(timeInput)) match = false;

                if (match) {
                    counts.total++;
                    let pointColor, statusText;
                    if (p.risk_level >= 4) { pointColor = 'var(--neon-red)'; statusText = 'CRITICAL'; counts.high++; }
                    else if (p.risk_level >= 2.5) { pointColor = 'var(--accent)'; statusText = 'WARNING'; }
                    else { pointColor = 'var(--neon-green)'; statusText = 'SAFE'; }

                    if(cType.includes('drugs')) chartData.drugs++;
                    else if(cType.includes('weapon')) chartData.weapon++;
                    else if(cType.includes('stolen') || cType.includes('theft')) chartData.theft++;
                    else chartData.other++;

                    L.circleMarker([p.latitude, p.longitude], {
                        radius: 6, fillColor: pointColor, color: "#fff", weight: 1, fillOpacity: 0.8
                    }).addTo(markersLayer).bindPopup(`
                        <div class="popup-container">
                            <div class="popup-header-custom">
                                <span class="popup-title" style="color:${pointColor}">Incident Report</span>
                                <span class="popup-badge" style="background:${pointColor}">${statusText}</span>
                            </div>
                            <div class="popup-row"><i class="fas fa-fingerprint"></i><span><b>Category:</b> ${p.object_of_search}</span></div>
                            <div class="popup-row"><i class="fas fa-exclamation-triangle"></i><span><b>Risk Level:</b> ${p.risk_level}</span></div>
                            <div class="popup-row"><i class="fas fa-calendar-alt"></i><span><b>Date:</b> ${rDate}</span></div>
                            <div class="popup-row"><i class="fas fa-clock"></i><span><b>Time:</b> ${rTime}</span></div>
                        </div>
                    `);
                }
            });

            document.getElementById('total-count').innerText = counts.total.toLocaleString();
            document.getElementById('high-risk-count').innerText = counts.high.toLocaleString();
            if(myChart) {
                myChart.data.datasets[0].data = [chartData.drugs, chartData.weapon, chartData.theft, chartData.other];
                myChart.update();
            }
        }

async function handleLogout() {
    try {
        await fetch('https://crime-project1.onrender.com/api/logout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: localStorage.getItem('user_id') || 1 })
        });
    } catch(e) {}
    localStorage.removeItem('token');
    localStorage.removeItem('role');
    localStorage.removeItem('name');
    window.location.href = 'index.html';
}

    </script>
</body>
</html>
